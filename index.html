<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Wrecker</title>
  <meta name="description" content="A curated travel archive by IYO House — explore the places we've been together." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Darumadrop+One&family=Gowun+Dodum&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Martian+Mono:wght@100..800&family=Monomakh&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">

</head>

<body class="single-page">
  <canvas id="rain-canvas"></canvas>

  <div class="title-wrapper" id="title-wrapper">
    <p class="home-eyebrow" id="home-eyebrow">Don't blame the forecast</p>
    <h1 class="home-title creepster-font" id="hero-title">Weather<br>Wrecker</h1>
  </div>

  <section class="home-section" id="home-section">
    <video class="hero-video" autoplay muted loop playsinline preload="metadata">
      <source src="Tekapo.mp4" type="video/mp4">
    </video>
    <div class="home-deco" aria-hidden="true"></div>
  </section>

  <section class="main-section" id="main-section">
    <div class="main-canvas" id="main-canvas" role="main" aria-label="Travel archive canvas"></div>
  </section>

  <div class="side-panel-overlay" id="panel-overlay" role="presentation"></div>

  <aside class="side-panel" id="side-panel" aria-label="Event detail panel" aria-hidden="true">
    <div class="panel-header">
      <div class="panel-header-info">
        <p class="panel-eyebrow" id="panel-eyebrow">Destination</p>
        <h2 class="panel-title" id="panel-title">—</h2>
      </div>
      <button class="panel-close" id="panel-close-btn" aria-label="Close panel">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M12 4L4 12M4 4L12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>
    </div>
    <div class="panel-body" id="panel-body">
      <!-- populated by JS -->
    </div>
  </aside>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <img id="lightboxImg" alt="">
  </div>

  <script src="main.js"></script>
  <script src="rain.js"></script>
</body>

</html>
